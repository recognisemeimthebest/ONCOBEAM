# CDSS용 PostgreSQL 로컬 개발 DB
# 기동:  docker compose up -d
# 접속:  postgresql+psycopg2://cdss:cdss@localhost:5432/cdss
services:
  db:
    image: postgres:16
    container_name: cdss-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: cdss
      POSTGRES_PASSWORD: cdss
      POSTGRES_DB: cdss
      TZ: Asia/Seoul
    ports:
      - "5432:5432"
    volumes:
      - cdss_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cdss -d cdss"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  cdss_pgdata:
